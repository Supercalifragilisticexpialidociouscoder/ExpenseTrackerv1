<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: {
            dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a25', 600: '#222230' },
            accent: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9' }
          }
        }
      }
    }
  </script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .anim-slide { animation: slideIn 0.35s ease-out forwards; }
    .anim-fade { animation: fadeIn 0.3s ease-out forwards; }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,92,246,0.12); }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #12121a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-dark-900 font-sans text-gray-100">
  <div id="root" class="h-full"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer } = Recharts;

    // ─── Category definitions with emoji & color ───
    const CATEGORIES = {
      food:          { emoji: '🍔', label: 'Food',          color: '#f97316' },
      transport:     { emoji: '🚗', label: 'Transport',     color: '#3b82f6' },
      entertainment: { emoji: '🎮', label: 'Entertainment', color: '#ec4899' },
      shopping:      { emoji: '🛍️', label: 'Shopping',      color: '#14b8a6' },
      bills:         { emoji: '📄', label: 'Bills',         color: '#eab308' },
      health:        { emoji: '💊', label: 'Health',        color: '#22c55e' },
      other:         { emoji: '📦', label: 'Other',         color: '#94a3b8' },
    };

    // ─── LocalStorage helpers ───
    const loadData = (key, fallback) => {
      try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
      catch { return fallback; }
    };
    const saveData = (key, val) => localStorage.setItem(key, JSON.stringify(val));

    // ─── Spending Personality calculator ───
    function getPersonality(income, expense) {
      if (income === 0) return { title: 'Getting Started', emoji: '🌱', desc: 'Add some income to begin!' };
      const ratio = expense / income;
      if (ratio < 0.3) return { title: 'Super Saver', emoji: '🏆', desc: 'Incredible discipline!' };
      if (ratio < 0.5) return { title: 'Smart Spender', emoji: '🧠', desc: 'Great balance of saving and spending.' };
      if (ratio < 0.75) return { title: 'Balanced', emoji: '⚖️', desc: 'You\'re right in the middle.' };
      if (ratio < 1) return { title: 'Big Spender', emoji: '💸', desc: 'Watch out, spending is high.' };
      return { title: 'Over Budget', emoji: '🚨', desc: 'Expenses exceed income!' };
    }

    // ─── Main App ───
    function App() {
      // Config from Element SDK
      const [cfg, setCfg] = useState({ app_title: 'Expense Tracker', currency_symbol: '$', font_family: 'Plus Jakarta Sans', font_size: 16, bg_color: '#0a0a0f', card_color: '#12121a', text_color: '#f3f4f6', accent_color: '#8b5cf6', secondary_color: '#1a1a25' });

      // Transaction state
      const [transactions, setTransactions] = useState(() => loadData('exp_txns', []));
      const [title, setTitle] = useState('');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState('food');
      const [txnType, setTxnType] = useState('expense');

      // Goal state
      const [goalAmount, setGoalAmount] = useState(() => loadData('exp_goal', 0));
      const [goalInput, setGoalInput] = useState('');

      // Toast
      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);

      // Delete confirmation
      const [confirmDelete, setConfirmDelete] = useState(null);

      // Persist
      useEffect(() => saveData('exp_txns', transactions), [transactions]);
      useEffect(() => saveData('exp_goal', goalAmount), [goalAmount]);

      // Element SDK init
      useEffect(() => {
        if (!window.elementSdk) return;
        const defaultConfig = { app_title: 'Expense Tracker', currency_symbol: '$', font_family: 'Plus Jakarta Sans', font_size: 16, bg_color: '#0a0a0f', card_color: '#12121a', text_color: '#f3f4f6', accent_color: '#8b5cf6', secondary_color: '#1a1a25' };
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (c) => setCfg(prev => ({ ...prev, ...c })),
          mapToCapabilities: (c) => ({
            recolorables: [
              { get: () => c.bg_color || defaultConfig.bg_color, set: v => { c.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
              { get: () => c.card_color || defaultConfig.card_color, set: v => { c.card_color = v; window.elementSdk.setConfig({ card_color: v }); } },
              { get: () => c.text_color || defaultConfig.text_color, set: v => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
              { get: () => c.accent_color || defaultConfig.accent_color, set: v => { c.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
              { get: () => c.secondary_color || defaultConfig.secondary_color, set: v => { c.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } },
            ],
            borderables: [],
            fontEditable: { get: () => c.font_family || defaultConfig.font_family, set: v => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
            fontSizeable: { get: () => c.font_size || defaultConfig.font_size, set: v => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
          }),
          mapToEditPanelValues: (c) => new Map([
            ['app_title', c.app_title || defaultConfig.app_title],
            ['currency_symbol', c.currency_symbol || defaultConfig.currency_symbol],
          ]),
        });
      }, []);

      const showToast = (msg) => {
        clearTimeout(toastTimer.current);
        setToast(msg);
        toastTimer.current = setTimeout(() => setToast(null), 2500);
      };

      // Computed values
      const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expenses = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = income - expenses;
      const cur = cfg.currency_symbol;
      const baseFont = cfg.font_size || 16;
      const fontStack = `${cfg.font_family || 'Plus Jakarta Sans'}, sans-serif`;

      // Expense by category for pie chart
      const expByCategory = {};
      transactions.filter(t => t.type === 'expense').forEach(t => {
        expByCategory[t.category] = (expByCategory[t.category] || 0) + t.amount;
      });
      const pieData = Object.entries(expByCategory).map(([key, value]) => ({
        name: CATEGORIES[key]?.label || key,
        value,
        color: CATEGORIES[key]?.color || '#94a3b8',
      }));

      // Top expense
      const topExpense = transactions.filter(t => t.type === 'expense').sort((a, b) => b.amount - a.amount)[0];

      // Daily spending limit (remaining balance / 30)
      const dailyLimit = balance > 0 ? (balance / 30).toFixed(2) : 0;

      // Personality
      const personality = getPersonality(income, expenses);

      // Goal progress
      const goalSaved = balance > 0 ? balance : 0;
      const goalProgress = goalAmount > 0 ? Math.min((goalSaved / goalAmount) * 100, 100) : 0;

      // Add transaction
      const addTransaction = (e) => {
        e.preventDefault();
        if (!title.trim() || !amount || parseFloat(amount) <= 0) { showToast('⚠️ Please fill all fields'); return; }
        const txn = { id: Date.now().toString(), title: title.trim(), amount: parseFloat(amount), category, type: txnType, date: new Date().toISOString() };
        setTransactions(prev => [txn, ...prev]);
        setTitle(''); setAmount(''); setCategory('food'); setTxnType('expense');
        showToast(txnType === 'income' ? '💰 Income added!' : '📝 Expense added!');
      };

      const deleteTxn = (id) => {
        setTransactions(prev => prev.filter(t => t.id !== id));
        setConfirmDelete(null);
        showToast('🗑️ Transaction deleted');
      };

      const setGoal = (e) => {
        e.preventDefault();
        const val = parseFloat(goalInput);
        if (!val || val <= 0) return;
        setGoalAmount(val);
        setGoalInput('');
        showToast('🎯 Goal set!');
      };

      const cardStyle = { backgroundColor: cfg.card_color, borderColor: cfg.secondary_color };
      const inputStyle = { backgroundColor: cfg.secondary_color, borderColor: cfg.secondary_color, color: cfg.text_color, fontFamily: fontStack, fontSize: `${baseFont * 0.875}px` };

      return (
        <div className="h-full overflow-auto" style={{ backgroundColor: cfg.bg_color, color: cfg.text_color, fontFamily: fontStack, fontSize: `${baseFont}px` }}>
          {/* Toast */}
          {toast && (
            <div className="fixed top-4 right-4 z-50 anim-fade rounded-xl px-5 py-3 shadow-2xl border" style={{ backgroundColor: cfg.accent_color, borderColor: cfg.accent_color, color: '#fff', fontSize: `${baseFont * 0.875}px` }}>
              {toast}
            </div>
          )}

          <div className="max-w-6xl mx-auto p-4 md:p-8">
            {/* Header */}
            <header className="mb-8 anim-slide">
              <h1 className="font-extrabold tracking-tight" style={{ fontSize: `${baseFont * 2}px`, color: cfg.accent_color }}>{cfg.app_title}</h1>
              <p style={{ color: cfg.text_color + '99', fontSize: `${baseFont * 0.875}px` }}>Track your finances with style</p>
            </header>

            {/* Summary Cards */}
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
              {[
                { label: 'Balance', value: balance, icon: '💎' },
                { label: 'Income', value: income, icon: '📈' },
                { label: 'Expenses', value: expenses, icon: '📉' },
              ].map((item, i) => (
                <div key={item.label} className="rounded-2xl border p-5 card-hover anim-slide" style={{ ...cardStyle, animationDelay: `${i * 0.08}s` }}>
                  <div className="flex items-center justify-between mb-2">
                    <span style={{ fontSize: `${baseFont * 0.8}px`, color: cfg.text_color + 'aa' }}>{item.label}</span>
                    <span style={{ fontSize: `${baseFont * 1.4}px` }}>{item.icon}</span>
                  </div>
                  <p className="font-bold" style={{ fontSize: `${baseFont * 1.6}px`, color: item.label === 'Expenses' ? '#f87171' : item.label === 'Income' ? '#4ade80' : cfg.accent_color }}>
                    {cur}{item.value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                  </p>
                </div>
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* Left Column: Form + Insights */}
              <div className="lg:col-span-1 space-y-5">
                {/* Add Transaction Form */}
                <div className="rounded-2xl border p-5 anim-slide" style={cardStyle}>
                  <h2 className="font-bold mb-4" style={{ fontSize: `${baseFont * 1.15}px` }}>Add Transaction</h2>
                  <form onSubmit={addTransaction} className="space-y-3">
                    {/* Type toggle */}
                    <div className="flex rounded-xl overflow-hidden border" style={{ borderColor: cfg.secondary_color }}>
                      {['expense', 'income'].map(t => (
                        <button key={t} type="button" onClick={() => setTxnType(t)}
                          className="flex-1 py-2.5 font-semibold transition-all"
                          style={{
                            backgroundColor: txnType === t ? cfg.accent_color : cfg.secondary_color,
                            color: txnType === t ? '#fff' : cfg.text_color + '99',
                            fontSize: `${baseFont * 0.85}px`
                          }}>
                          {t === 'income' ? '📈 Income' : '📉 Expense'}
                        </button>
                      ))}
                    </div>
                    <input type="text" placeholder="Title" value={title} onChange={e => setTitle(e.target.value)}
                      className="w-full rounded-xl border px-4 py-3 outline-none focus:ring-2 transition-all"
                      style={{ ...inputStyle, '--tw-ring-color': cfg.accent_color }} />
                    <input type="number" placeholder="Amount" value={amount} onChange={e => setAmount(e.target.value)} min="0" step="0.01"
                      className="w-full rounded-xl border px-4 py-3 outline-none focus:ring-2 transition-all"
                      style={inputStyle} />
                    {txnType === 'expense' && (
                      <div className="grid grid-cols-4 gap-2">
                        {Object.entries(CATEGORIES).map(([key, cat]) => (
                          <button key={key} type="button" onClick={() => setCategory(key)}
                            className="rounded-xl py-2 text-center transition-all border"
                            style={{
                              backgroundColor: category === key ? cat.color + '33' : cfg.secondary_color,
                              borderColor: category === key ? cat.color : 'transparent',
                              fontSize: `${baseFont * 0.7}px`
                            }}>
                            <div style={{ fontSize: `${baseFont * 1.1}px` }}>{cat.emoji}</div>
                            <div className="mt-0.5" style={{ color: cfg.text_color + 'cc' }}>{cat.label}</div>
                          </button>
                        ))}
                      </div>
                    )}
                    <button type="submit" className="w-full rounded-xl py-3 font-bold transition-all hover:opacity-90"
                      style={{ backgroundColor: cfg.accent_color, color: '#fff', fontSize: `${baseFont * 0.95}px` }}>
                      Add {txnType === 'income' ? 'Income' : 'Expense'}
                    </button>
                  </form>
                </div>

                {/* Personality Card */}
                <div className="rounded-2xl border p-5 card-hover anim-slide" style={cardStyle}>
                  <h2 className="font-bold mb-3" style={{ fontSize: `${baseFont * 1.1}px` }}>Spending Personality</h2>
                  <div className="text-center py-3">
                    <span style={{ fontSize: `${baseFont * 2.5}px` }}>{personality.emoji}</span>
                    <p className="font-bold mt-2" style={{ fontSize: `${baseFont * 1.3}px`, color: cfg.accent_color }}>{personality.title}</p>
                    <p style={{ color: cfg.text_color + '99', fontSize: `${baseFont * 0.8}px` }}>{personality.desc}</p>
                  </div>
                </div>

                {/* Goal Tracker */}
                <div className="rounded-2xl border p-5 card-hover anim-slide" style={cardStyle}>
                  <h2 className="font-bold mb-3" style={{ fontSize: `${baseFont * 1.1}px` }}>🎯 Savings Goal</h2>
                  {goalAmount > 0 ? (
                    <div>
                      <div className="flex justify-between mb-2" style={{ fontSize: `${baseFont * 0.8}px`, color: cfg.text_color + 'aa' }}>
                        <span>{cur}{goalSaved.toFixed(2)} saved</span>
                        <span>{cur}{goalAmount.toFixed(2)} goal</span>
                      </div>
                      <div className="w-full rounded-full h-4 overflow-hidden" style={{ backgroundColor: cfg.secondary_color }}>
                        <div className="h-full rounded-full transition-all duration-700" style={{ width: `${goalProgress}%`, background: `linear-gradient(90deg, ${cfg.accent_color}, #c084fc)` }} />
                      </div>
                      <p className="text-center mt-2 font-bold" style={{ color: cfg.accent_color, fontSize: `${baseFont * 1.1}px` }}>{goalProgress.toFixed(0)}%</p>
                      <button onClick={() => setGoalAmount(0)} className="w-full mt-2 rounded-lg py-1.5 border transition-all hover:opacity-80"
                        style={{ borderColor: cfg.secondary_color, color: cfg.text_color + '99', fontSize: `${baseFont * 0.75}px` }}>Reset Goal</button>
                    </div>
                  ) : (
                    <form onSubmit={setGoal} className="flex gap-2">
                      <input type="number" placeholder="Target amount" value={goalInput} onChange={e => setGoalInput(e.target.value)}
                        className="flex-1 rounded-xl border px-3 py-2.5 outline-none" style={inputStyle} />
                      <button type="submit" className="rounded-xl px-4 py-2.5 font-semibold" style={{ backgroundColor: cfg.accent_color, color: '#fff', fontSize: `${baseFont * 0.85}px` }}>Set</button>
                    </form>
                  )}
                </div>

                {/* Quick Stats */}
                <div className="rounded-2xl border p-5 card-hover anim-slide" style={cardStyle}>
                  <h2 className="font-bold mb-3" style={{ fontSize: `${baseFont * 1.1}px` }}>Quick Stats</h2>
                  <div className="space-y-3">
                    <div className="flex justify-between items-center">
                      <span style={{ color: cfg.text_color + 'aa', fontSize: `${baseFont * 0.85}px` }}>📊 Daily Limit</span>
                      <span className="font-bold" style={{ color: '#4ade80', fontSize: `${baseFont * 0.95}px` }}>{cur}{dailyLimit}/day</span>
                    </div>
                    {topExpense && (
                      <div className="flex justify-between items-center">
                        <span style={{ color: cfg.text_color + 'aa', fontSize: `${baseFont * 0.85}px` }}>🔥 Top Expense</span>
                        <span className="font-bold" style={{ color: '#f87171', fontSize: `${baseFont * 0.95}px` }}>{topExpense.title} ({cur}{topExpense.amount})</span>
                      </div>
                    )}
                    <div className="flex justify-between items-center">
                      <span style={{ color: cfg.text_color + 'aa', fontSize: `${baseFont * 0.85}px` }}>📝 Transactions</span>
                      <span className="font-bold" style={{ fontSize: `${baseFont * 0.95}px` }}>{transactions.length}</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Right Column: Chart + List */}
              <div className="lg:col-span-2 space-y-5">
                {/* Pie Chart */}
                <div className="rounded-2xl border p-5 anim-slide" style={cardStyle}>
                  <h2 className="font-bold mb-4" style={{ fontSize: `${baseFont * 1.15}px` }}>Expenses by Category</h2>
                  {pieData.length > 0 ? (
                    <div style={{ height: '280px' }}>
                      <ResponsiveContainer width="100%" height="100%">
                        <PieChart>
                          <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={4} dataKey="value" animationBegin={0} animationDuration={800}>
                            {pieData.map((entry, i) => <Cell key={i} fill={entry.color} stroke="transparent" />)}
                          </Pie>
                          <Tooltip
                            contentStyle={{ backgroundColor: cfg.card_color, border: `1px solid ${cfg.secondary_color}`, borderRadius: '12px', color: cfg.text_color, fontFamily: fontStack }}
                            formatter={(val) => [`${cur}${val.toFixed(2)}`, '']}
                          />
                        </PieChart>
                      </ResponsiveContainer>
                    </div>
                  ) : (
                    <div className="text-center py-12" style={{ color: cfg.text_color + '66' }}>
                      <span style={{ fontSize: `${baseFont * 2.5}px` }}>📊</span>
                      <p className="mt-2" style={{ fontSize: `${baseFont * 0.9}px` }}>Add expenses to see the chart</p>
                    </div>
                  )}
                  {/* Legend */}
                  {pieData.length > 0 && (
                    <div className="flex flex-wrap gap-3 mt-4 justify-center">
                      {pieData.map(d => (
                        <div key={d.name} className="flex items-center gap-1.5" style={{ fontSize: `${baseFont * 0.78}px` }}>
                          <div className="w-3 h-3 rounded-full" style={{ backgroundColor: d.color }} />
                          <span style={{ color: cfg.text_color + 'cc' }}>{d.name}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Transaction List */}
                <div className="rounded-2xl border p-5 anim-slide" style={cardStyle}>
                  <h2 className="font-bold mb-4" style={{ fontSize: `${baseFont * 1.15}px` }}>Transactions</h2>
                  {transactions.length === 0 ? (
                    <div className="text-center py-12" style={{ color: cfg.text_color + '66' }}>
                      <span style={{ fontSize: `${baseFont * 2.5}px` }}>💰</span>
                      <p className="mt-2" style={{ fontSize: `${baseFont * 0.9}px` }}>No transactions yet</p>
                    </div>
                  ) : (
                    <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
                      {transactions.map((txn, i) => {
                        const cat = CATEGORIES[txn.category];
                        const isIncome = txn.type === 'income';
                        return (
                          <div key={txn.id} className="flex items-center gap-3 rounded-xl p-3 transition-all hover:opacity-90 anim-slide"
                            style={{ backgroundColor: cfg.secondary_color, animationDelay: `${i * 0.03}s` }}>
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
                              style={{ backgroundColor: isIncome ? '#4ade8022' : (cat?.color || '#94a3b8') + '22', fontSize: `${baseFont * 1.2}px` }}>
                              {isIncome ? '📈' : (cat?.emoji || '📦')}
                            </div>
                            <div className="flex-1 min-w-0">
                              <p className="font-semibold truncate" style={{ fontSize: `${baseFont * 0.9}px` }}>{txn.title}</p>
                              <p style={{ fontSize: `${baseFont * 0.7}px`, color: cfg.text_color + '77' }}>
                                {isIncome ? 'Income' : cat?.label || txn.category} · {new Date(txn.date).toLocaleDateString()}
                              </p>
                            </div>
                            <p className="font-bold flex-shrink-0" style={{ color: isIncome ? '#4ade80' : '#f87171', fontSize: `${baseFont * 0.95}px` }}>
                              {isIncome ? '+' : '-'}{cur}{txn.amount.toFixed(2)}
                            </p>
                            {confirmDelete === txn.id ? (
                              <div className="flex gap-1 flex-shrink-0">
                                <button onClick={() => deleteTxn(txn.id)} className="rounded-lg px-2 py-1 text-white font-semibold"
                                  style={{ backgroundColor: '#ef4444', fontSize: `${baseFont * 0.7}px` }}>Yes</button>
                                <button onClick={() => setConfirmDelete(null)} className="rounded-lg px-2 py-1"
                                  style={{ backgroundColor: cfg.card_color, fontSize: `${baseFont * 0.7}px`, color: cfg.text_color + 'aa' }}>No</button>
                              </div>
                            ) : (
                              <button onClick={() => setConfirmDelete(txn.id)} className="rounded-lg p-2 transition-all hover:opacity-70 flex-shrink-0"
                                style={{ color: cfg.text_color + '55' }} aria-label="Delete transaction">
                                🗑️
                              </button>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
