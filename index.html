<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; }
* { font-family: 'DM Sans', sans-serif; }
.mono { font-family: 'Space Mono', monospace; }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.anim-slide { animation: slideUp 0.4s ease both; }
.anim-fade { animation: fadeIn 0.5s ease both; }
.toast-in { animation: slideUp 0.3s ease both; }
.toast-out { animation: fadeIn 0.3s ease reverse both; }
body { box-sizing: border-box; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background:#0f1117;">
   <!-- Toast Container -->
   <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div><!-- Header -->
   <header class="w-full px-4 pt-6 pb-4 text-center anim-fade">
    <h1 id="app-title" class="text-2xl md:text-3xl font-bold" style="color:#a78bfa;">Expense Tracker</h1>
    <p id="app-subtitle" class="text-sm mt-1" style="color:#6b7280;">Track your money smartly</p>
   </header>
   <div class="max-w-5xl mx-auto px-4 pb-8">
    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
     <div class="rounded-xl p-4 anim-slide" style="background:#1a1d27; animation-delay:0.05s;">
      <div class="flex items-center gap-2 mb-1">
       <i data-lucide="wallet" style="width:18px;height:18px;color:#a78bfa;"></i> <span class="text-xs font-medium uppercase tracking-wider" style="color:#6b7280;">Balance</span>
      </div>
      <p id="balance" class="mono text-xl font-bold" style="color:#e2e8f0;">₹2,450</p>
     </div>
     <div class="rounded-xl p-4 anim-slide" style="background:#1a1d27; animation-delay:0.1s;">
      <div class="flex items-center gap-2 mb-1">
       <i data-lucide="trending-up" style="width:18px;height:18px;color:#34d399;"></i> <span class="text-xs font-medium uppercase tracking-wider" style="color:#6b7280;">Income</span>
      </div>
      <p id="total-income" class="mono text-xl font-bold" style="color:#34d399;">₹4,000</p>
     </div>
     <div class="rounded-xl p-4 anim-slide" style="background:#1a1d27; animation-delay:0.15s;">
      <div class="flex items-center gap-2 mb-1">
       <i data-lucide="trending-down" style="width:18px;height:18px;color:#f87171;"></i> <span class="text-xs font-medium uppercase tracking-wider" style="color:#6b7280;">Expenses</span>
      </div>
      <p id="total-expenses" class="mono text-xl font-bold" style="color:#f87171;">₹1,550</p>
     </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
     <!-- Add Transaction Form -->
     <div class="rounded-xl p-5 anim-slide" style="background:#1a1d27; animation-delay:0.2s;">
      <h2 class="text-base font-semibold mb-4" style="color:#e2e8f0;">Add Transaction</h2>
      <form id="txn-form" class="space-y-3">
       <div>
        <label for="txn-title" class="block text-xs font-medium mb-1" style="color:#9ca3af;">Title</label> <input id="txn-title" type="text" placeholder="e.g. Groceries" required class="w-full rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-purple-500/50" style="background:#262937; color:#e2e8f0; border:1px solid #333650;">
       </div>
       <div class="grid grid-cols-2 gap-3">
        <div>
         <label for="txn-amount" class="block text-xs font-medium mb-1" style="color:#9ca3af;">Amount (₹)</label> <input id="txn-amount" type="number" min="1" placeholder="500" required class="w-full rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-purple-500/50" style="background:#262937; color:#e2e8f0; border:1px solid #333650;">
        </div>
        <div>
         <label for="txn-category" class="block text-xs font-medium mb-1" style="color:#9ca3af;">Category</label> <select id="txn-category" required class="w-full rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-purple-500/50" style="background:#262937; color:#e2e8f0; border:1px solid #333650;"> <option value="Salary">Salary</option> <option value="Food">Food</option> <option value="Shopping">Shopping</option> <option value="Transport">Transport</option> <option value="Bills">Bills</option> <option value="Entertainment">Entertainment</option> <option value="Health">Health</option> <option value="Other">Other</option> </select>
        </div>
       </div>
       <div>
        <label class="block text-xs font-medium mb-2" style="color:#9ca3af;">Type</label>
        <div class="flex gap-2">
         <button type="button" id="btn-income" onclick="setType('income')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all" style="background:#166534; color:#34d399; border:1px solid #22c55e44;">Income</button> <button type="button" id="btn-expense" onclick="setType('expense')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all" style="background:#262937; color:#9ca3af; border:1px solid #333650;">Expense</button>
        </div>
       </div><button type="submit" class="w-full py-2.5 rounded-lg text-sm font-semibold transition-all hover:brightness-110" style="background:#7c3aed; color:#fff;"> Add Transaction </button>
      </form>
     </div><!-- Transaction List -->
     <div class="rounded-xl p-5 anim-slide" style="background:#1a1d27; animation-delay:0.25s;">
      <h2 class="text-base font-semibold mb-4" style="color:#e2e8f0;">Transactions</h2>
      <div id="txn-list" class="space-y-2 max-h-72 overflow-y-auto pr-1" style="scrollbar-width:thin; scrollbar-color:#333650 transparent;"></div>
      <p id="txn-empty" class="text-center text-sm py-6 hidden" style="color:#6b7280;">No transactions yet</p>
     </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
     <!-- Pie Chart -->
     <div class="lg:col-span-2 rounded-xl p-5 anim-slide" style="background:#1a1d27; animation-delay:0.3s;">
      <h2 class="text-base font-semibold mb-4" style="color:#e2e8f0;">Expenses by Category</h2>
      <div class="flex flex-col sm:flex-row items-center gap-6">
       <svg id="pie-chart" viewbox="0 0 200 200" width="180" height="180"></svg>
       <div id="pie-legend" class="flex flex-col gap-2"></div>
      </div>
      <p id="pie-empty" class="text-center text-sm py-6 hidden" style="color:#6b7280;">Add expenses to see chart</p>
     </div><!-- Sidebar Extras -->
     <div class="space-y-4">
      <!-- Top Expense -->
      <div class="rounded-xl p-4 anim-slide" style="background:#1a1d27; animation-delay:0.35s;">
       <div class="flex items-center gap-2 mb-2">
        <i data-lucide="flame" style="width:16px;height:16px;color:#fb923c;"></i>
        <h3 class="text-sm font-semibold" style="color:#e2e8f0;">Top Expense</h3>
       </div>
       <p id="top-expense" class="mono text-sm" style="color:#fb923c;">—</p>
      </div><!-- Spending Personality -->
      <div class="rounded-xl p-4 anim-slide" style="background:#1a1d27; animation-delay:0.4s;">
       <div class="flex items-center gap-2 mb-2">
        <i data-lucide="sparkles" style="width:16px;height:16px;color:#facc15;"></i>
        <h3 class="text-sm font-semibold" style="color:#e2e8f0;">Spending Personality</h3>
       </div>
       <p id="personality" class="text-sm font-medium" style="color:#facc15;">—</p>
       <p id="personality-desc" class="text-xs mt-1" style="color:#6b7280;"></p>
      </div><!-- Goal Tracker -->
      <div class="rounded-xl p-4 anim-slide" style="background:#1a1d27; animation-delay:0.45s;">
       <div class="flex items-center gap-2 mb-2">
        <i data-lucide="target" style="width:16px;height:16px;color:#a78bfa;"></i>
        <h3 id="goal-title" class="text-sm font-semibold" style="color:#e2e8f0;">Emergency Fund</h3>
       </div>
       <div class="flex items-center justify-between text-xs mb-1">
        <span id="goal-saved" class="mono" style="color:#a78bfa;">₹0</span> <span id="goal-target" class="mono" style="color:#6b7280;">₹1,000</span>
       </div>
       <div class="w-full rounded-full h-2.5 overflow-hidden" style="background:#262937;">
        <div id="goal-bar" class="h-full rounded-full transition-all duration-500" style="background:linear-gradient(90deg,#7c3aed,#a78bfa); width:0%;"></div>
       </div>
       <div class="mt-3 flex gap-2">
        <input id="goal-input" type="number" min="1" placeholder="Add ₹" class="flex-1 rounded-lg px-2 py-1.5 text-xs outline-none" style="background:#262937; color:#e2e8f0; border:1px solid #333650;"> <button onclick="addToGoal()" class="px-3 py-1.5 rounded-lg text-xs font-medium hover:brightness-110 transition-all" style="background:#7c3aed; color:#fff;">Save</button>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
// ── State ──
const STORAGE_KEY = 'expense_tracker_data';
const GOAL_KEY = 'expense_tracker_goal';
const CAT_COLORS = {
  Salary:'#34d399', Food:'#f87171', Shopping:'#a78bfa', Transport:'#38bdf8',
  Bills:'#fb923c', Entertainment:'#facc15', Health:'#f472b6', Other:'#6b7280'
};

let transactions = [];
let txnType = 'income';
let goalSaved = 0;
const goalTarget = 1000;

// ── LocalStorage ──
function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    transactions = d ? JSON.parse(d) : getSampleData();
    const g = localStorage.getItem(GOAL_KEY);
    goalSaved = g ? parseFloat(g) : 600;
  } catch { 
    transactions = getSampleData(); 
    goalSaved = 600; 
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
  localStorage.setItem(GOAL_KEY, String(goalSaved));
}

function getSampleData() {
  return [
    { id: 1, title:'Salary', amount:3000, category:'Salary', type:'income' },
    { id: 2, title:'Freelance', amount:1000, category:'Other', type:'income' },
    { id: 3, title:'Groceries', amount:200, category:'Food', type:'expense' },
    { id: 4, title:'New Shoes', amount:150, category:'Shopping', type:'expense' },
    { id: 5, title:'Bus Pass', amount:50, category:'Transport', type:'expense' },
    { id: 6, title:'Electricity', amount:350, category:'Bills', type:'expense' },
    { id: 7, title:'Movie Night', amount:300, category:'Entertainment', type:'expense' },
    { id: 8, title:'Medicine', amount:500, category:'Health', type:'expense' },
  ];
}

// ── Rendering ──
function render() {
  const income = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expenses = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expenses;

  document.getElementById('balance').textContent = `₹${balance.toLocaleString('en-IN')}`;
  document.getElementById('balance').style.color = balance >= 0 ? '#e2e8f0' : '#f87171';
  document.getElementById('total-income').textContent = `₹${income.toLocaleString('en-IN')}`;
  document.getElementById('total-expenses').textContent = `₹${expenses.toLocaleString('en-IN')}`;

  // Transaction List
  const list = document.getElementById('txn-list');
  const empty = document.getElementById('txn-empty');
  if (transactions.length === 0) {
    list.classList.add('hidden'); 
    empty.classList.remove('hidden');
  } else {
    list.classList.remove('hidden'); 
    empty.classList.add('hidden');
    const sorted = [...transactions].reverse();
    const existingMap = new Map([...list.children].map(el => [el.dataset.id, el]));
    const newIds = new Set(sorted.map(t => String(t.id)));

    existingMap.forEach((el, id) => { 
      if (!newIds.has(id)) el.remove(); 
    });

    sorted.forEach((t, i) => {
      const id = String(t.id);
      let el = existingMap.get(id);
      if (!el) {
        el = document.createElement('div');
        el.dataset.id = id;
        el.className = 'flex items-center justify-between rounded-lg px-3 py-2.5 group transition-all';
        el.style.cssText = 'background:#262937;';
        list.appendChild(el);
      }
      const isInc = t.type === 'income';
      const color = isInc ? '#34d399' : '#f87171';
      const catColor = CAT_COLORS[t.category] || '#6b7280';
      el.innerHTML = `
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:${catColor}22;">
            <span class="text-xs font-bold" style="color:${catColor};">${t.category.charAt(0)}</span>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-medium truncate" style="color:#e2e8f0;">${t.title}</p>
            <p class="text-xs" style="color:#6b7280;">${t.category}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="mono text-sm font-semibold" style="color:${color};">${isInc?'+':'−'}₹${t.amount.toLocaleString('en-IN')}</span>
          <button onclick="deleteTxn(${t.id})" class="opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded hover:bg-red-500/20" title="Delete">
            <i data-lucide="x" style="width:14px;height:14px;color:#f87171;"></i>
          </button>
        </div>`;
    });
  }

  // Pie Chart
  const expenseItems = transactions.filter(t => t.type === 'expense');
  const pieChart = document.getElementById('pie-chart');
  const pieLegend = document.getElementById('pie-legend');
  const pieEmpty = document.getElementById('pie-empty');

  if (expenseItems.length === 0) {
    pieChart.classList.add('hidden'); 
    pieLegend.classList.add('hidden'); 
    pieEmpty.classList.remove('hidden');
  } else {
    pieChart.classList.remove('hidden'); 
    pieLegend.classList.remove('hidden'); 
    pieEmpty.classList.add('hidden');
    const catTotals = {};
    expenseItems.forEach(t => { 
      catTotals[t.category] = (catTotals[t.category]||0) + t.amount; 
    });
    const cats = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
    const total = cats.reduce((s,c)=>s+c[1],0);

    let paths = '';
    let cumAngle = -90;
    cats.forEach(([cat, amt]) => {
      const angle = (amt/total)*360;
      const startRad = cumAngle * Math.PI/180;
      const endRad = (cumAngle+angle) * Math.PI/180;
      const x1 = 100+80*Math.cos(startRad), y1 = 100+80*Math.sin(startRad);
      const x2 = 100+80*Math.cos(endRad), y2 = 100+80*Math.sin(endRad);
      const large = angle > 180 ? 1 : 0;
      const color = CAT_COLORS[cat]||'#6b7280';
      if (cats.length === 1) {
        paths += `<circle cx="100" cy="100" r="80" fill="${color}"/>`;
      } else {
        paths += `<path d="M100,100 L${x1},${y1} A80,80 0 ${large},1 ${x2},${y2} Z" fill="${color}" opacity="0.85"/>`;
      }
      cumAngle += angle;
    });
    paths += `<circle cx="100" cy="100" r="40" fill="#1a1d27"/>`;
    pieChart.innerHTML = paths;

    pieLegend.innerHTML = cats.map(([cat, amt]) => {
      const pct = Math.round(amt/total*100);
      return `<div class="flex items-center gap-2">
        <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${CAT_COLORS[cat]||'#6b7280'};"></div>
        <span class="text-xs" style="color:#9ca3af;">${cat}</span>
        <span class="mono text-xs font-medium" style="color:#e2e8f0;">₹${amt.toLocaleString('en-IN')}</span>
        <span class="text-xs" style="color:#6b7280;">${pct}%</span>
      </div>`;
    }).join('');
  }

  // Top Expense
  const topEl = document.getElementById('top-expense');
  if (expenseItems.length > 0) {
    const top = expenseItems.reduce((a,b) => a.amount > b.amount ? a : b);
    topEl.textContent = `${top.title} — ₹${top.amount.toLocaleString('en-IN')}`;
  } else { 
    topEl.textContent = '—'; 
  }

  // Spending Personality
  const ratio = income > 0 ? expenses / income : 0;
  const pEl = document.getElementById('personality');
  const pdEl = document.getElementById('personality-desc');
  let pName, pDesc;
  if (income === 0 && expenses === 0) { 
    pName = '—'; 
    pDesc = ''; 
  } else if (ratio < 0.3) { 
    pName = '🏦 Super Saver'; 
    pDesc = 'You save over 70% of your income!'; 
  } else if (ratio < 0.5) { 
    pName = '💰 Smart Saver'; 
    pDesc = 'Great balance between saving and spending.'; 
  } else if (ratio < 0.75) { 
    pName = '⚖️ Balanced Spender'; 
    pDesc = 'You manage money responsibly.'; 
  } else if (ratio < 1) { 
    pName = '🛍️ Big Spender'; 
    pDesc = 'Consider cutting back a little.'; 
  } else { 
    pName = '🔥 Over Budget'; 
    pDesc = 'Expenses exceed income — time to review!'; 
  }
  pEl.textContent = pName;
  pdEl.textContent = pDesc;

  // Goal
  const pct = Math.min(100, Math.round(goalSaved / goalTarget * 100));
  document.getElementById('goal-saved').textContent = `₹${goalSaved.toLocaleString('en-IN')}`;
  document.getElementById('goal-target').textContent = `₹${goalTarget.toLocaleString('en-IN')}`;
  document.getElementById('goal-bar').style.width = pct + '%';

  lucide.createIcons();
  saveData();
}

// ── Actions ──
function setType(type) {
  txnType = type;
  const bi = document.getElementById('btn-income');
  const be = document.getElementById('btn-expense');
  if (type === 'income') {
    bi.style.cssText = 'background:#166534; color:#34d399; border:1px solid #22c55e44;';
    be.style.cssText = 'background:#262937; color:#9ca3af; border:1px solid #333650;';
  } else {
    be.style.cssText = 'background:#7f1d1d; color:#f87171; border:1px solid #ef444444;';
    bi.style.cssText = 'background:#262937; color:#9ca3af; border:1px solid #333650;';
  }
}

function deleteTxn(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) {
    el.style.transition = 'all 0.2s'; 
    el.style.opacity = '0'; 
    el.style.transform = 'translateX(20px)';
    setTimeout(() => { 
      transactions = transactions.filter(t => t.id !== id); 
      render(); 
    }, 200);
  }
}

function addToGoal() {
  const input = document.getElementById('goal-input');
  const val = parseFloat(input.value);
  if (!val || val <= 0) return;
  goalSaved = Math.min(goalSaved + val, goalTarget);
  input.value = '';
  if (goalSaved >= goalTarget) showToast('🎉 Goal reached!', '#34d399');
  render();
}

function showToast(msg, color) {
  const t = document.createElement('div');
  t.className = 'toast-in rounded-lg px-4 py-2 text-sm font-medium shadow-lg';
  t.style.cssText = `background:#1a1d27; color:${color}; border:1px solid ${color}33;`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { 
    t.className = 'toast-out rounded-lg px-4 py-2 text-sm font-medium shadow-lg'; 
    setTimeout(() => t.remove(), 300); 
  }, 2000);
}

// ── Form ──
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('txn-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const title = document.getElementById('txn-title').value.trim();
    const amount = parseFloat(document.getElementById('txn-amount').value);
    const category = document.getElementById('txn-category').value;
    if (!title || !amount || amount <= 0) return;
    transactions.push({ id: Date.now(), title, amount, category, type: txnType });
    this.reset();
    setType('income');
    showToast(txnType === 'income' ? '✅ Income added' : '📝 Expense added', txnType === 'income' ? '#34d399' : '#f87171');
    render();
  });

  // ── Init ──
  loadData();
  render();
  lucide.createIcons();
});
  </script>
